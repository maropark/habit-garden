services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: habit_garden
      POSTGRES_PASSWORD: habit_garden_password
      POSTGRES_DB: habit_garden
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://habit_garden:habit_garden_password@db:5432/habit_garden
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app

volumes:
  db_data:

